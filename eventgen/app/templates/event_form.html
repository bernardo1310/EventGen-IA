{% extends 'base.html' %}

{% block title %}Novo Evento - EventGen AI{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-lg-7">

        <div class="mb-4">
            <a href="{{ url_for('events.index') }}" class="text-muted small text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i>Voltar
            </a>
        </div>

        <div class="card eg-card">
            <div class="card-header eg-card-header">
                <h5 class="mb-0 fw-semibold">
                    <i class="bi bi-calendar-plus me-2"></i>Cadastro de Evento
                </h5>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('events.new_event') }}">

                    <div class="mb-4">
                        <label class="form-label fw-medium">Nome do Evento</label>
                        <input type="text" class="form-control" name="name"
                               placeholder="Ex.: Festival de Música 2025" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium">Total de Participantes</label>
                        <input type="number" class="form-control" name="total_participants"
                               min="1" placeholder="Ex.: 5000" required>
                        <div class="form-text">Quantidade estimada de pessoas no evento.</div>
                    </div>

                    <hr class="my-4">

                    <h6 class="fw-semibold mb-3 text-accent-dark">
                        <i class="bi bi-people me-2"></i>Recursos Disponíveis
                    </h6>

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-medium">
                                <i class="bi bi-shield-check me-1 text-muted"></i>Seguranças
                            </label>
                            <input type="number" class="form-control" name="security_count"
                                   min="0" value="0" required>
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-medium">
                                <i class="bi bi-fire me-1 text-muted"></i>Brigadistas
                            </label>
                            <input type="number" class="form-control" name="firefighter_count"
                                   min="0" value="0" required>
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-medium">
                                <i class="bi bi-heart-pulse me-1 text-muted"></i>Equipes Médicas
                            </label>
                            <input type="number" class="form-control" name="medical_count"
                                   min="0" value="0" required>
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{{ url_for('events.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i>Cadastrar Evento
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
